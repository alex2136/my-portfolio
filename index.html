<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex - Developer Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; overflow-x: hidden; position: relative; }
        .bg-effects { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; }
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
        .gradient-orbs { position: absolute; width: 100%; height: 100%; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #8b5cf6, transparent); top: 10%; left: 5%; animation: float1 25s ease-in-out infinite; }
        .orb-2 { width: 450px; height: 450px; background: radial-gradient(circle, #6366f1, transparent); bottom: 10%; right: 5%; animation: float2 22s ease-in-out infinite; }
        @keyframes float1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(100px, -80px) scale(1.1); } }
        @keyframes float2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-90px, 60px) scale(1.1); } }
        .cookies-banner { position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%); background: rgba(17, 17, 27, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 16px; padding: 24px 32px; z-index: 2000; max-width: 600px; width: 90%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6); transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .cookies-banner.show { bottom: 30px; }
        .cookies-content { display: flex; flex-direction: column; gap: 16px; }
        .cookies-text { color: #ccc; font-size: 0.95rem; line-height: 1.6; }
        .cookies-actions { display: flex; gap: 12px; }
        .cookie-btn { flex: 1; padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem; }
        .cookie-accept { background: linear-gradient(135deg, #7c3aed, #8b5cf6); color: #fff; }
        .cookie-accept:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4); }
        .cookie-decline { background: rgba(255, 255, 255, 0.05); color: #999; border: 1px solid rgba(255, 255, 255, 0.1); }
        .cookie-decline:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        .modal { display: flex; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; align-items: center; justify-content: center; }
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(8px); }
        .modal-content { background: #0f0f17; margin: auto; padding: 60px; border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 24px; width: 90%; max-width: 1200px; position: relative; z-index: 1001; box-shadow: 0 30px 100px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(139, 92, 246, 0.2); }
        .modal-close { position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #999; width: 40px; height: 40px; border-radius: 10px; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; line-height: 1; }
        .modal-close:hover { background: rgba(255, 255, 255, 0.1); color: #fff; border-color: rgba(255, 255, 255, 0.2); transform: rotate(90deg); }
        .contact-step { display: none; }
        .contact-step.active { display: block; }
        .contact-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 50px; align-items: start; }
        .contact-left { background: rgba(88, 101, 242, 0.05); border: 1px solid rgba(88, 101, 242, 0.2); border-radius: 20px; padding: 40px; text-align: center; }
        .contact-right { display: flex; flex-direction: column; gap: 20px; }
        .modal-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 15px; text-align: center; }
        .modal-title .title-white { color: #fff; }
        .modal-title .title-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .modal-subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 1.05rem; }
        .discord-box-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #5865f2, #7289da); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; }
        .discord-box-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 10px; color: #fff; }
        .discord-box-desc { color: #999; margin-bottom: 20px; font-size: 0.95rem; }
        .discord-link { display: inline-block; color: #6366f1; font-weight: 600; font-size: 1.05rem; text-decoration: none; padding: 8px; border-radius: 6px; transition: all 0.3s ease; }
        .discord-link:hover { background: rgba(99, 102, 241, 0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-field { display: flex; flex-direction: column; gap: 8px; }
        .form-label { color: #fff; font-weight: 600; font-size: 0.95rem; }
        .form-input, .form-textarea { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 14px 16px; color: #fff; font-size: 0.95rem; font-family: 'Inter', sans-serif; transition: all 0.3s ease; outline: none; }
        .form-input:focus, .form-textarea:focus { background: rgba(255, 255, 255, 0.05); border-color: rgba(139, 92, 246, 0.5); }
        .form-input::placeholder, .form-textarea::placeholder { color: #666; }
        .form-textarea { resize: none; min-height: 150px; }
        .submit-button { width: 100%; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; padding: 16px; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; }
        .submit-button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
        @media (max-width: 768px) {
            .modal-content { padding: 35px 25px; margin: 20px; width: calc(100% - 40px); }
            .contact-layout { grid-template-columns: 1fr; gap: 30px; }
            .modal-title { font-size: 2rem; }
            .form-row { grid-template-columns: 1fr; }
            .cookies-banner { padding: 20px 24px; }
            .cookies-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="grid-overlay"></div>
        <div class="gradient-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>
    </div>
    
    <div class="cookies-banner" id="cookiesBanner">
        <div class="cookies-content">
            <div class="cookies-text">This website uses cookies to enhance your experience and analyze site traffic. By continuing to use this site, you accept our use of cookies.</div>
            <div class="cookies-actions">
                <button class="cookie-btn cookie-accept" onclick="acceptCookies()">Accept Cookies</button>
                <button class="cookie-btn cookie-decline" onclick="declineCookies()">Decline</button>
            </div>
        </div>
    </div>
    
    <div id="contactModal" class="modal">
        <div class="modal-overlay" onclick="closeContactModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeContactModal()">×</button>
            <div class="contact-step active">
                <h2 class="modal-title"><span class="title-white">Contact</span> <span class="title-gradient">Me</span></h2>
                <p class="modal-subtitle">Contact me about a project, partnership, or anything else you need help with.</p>
                <div class="contact-layout">
                    <div class="contact-left">
                        <div class="discord-box-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="white">
                                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
                            </svg>
                        </div>
                        <h3 class="discord-box-title">Discord</h3>
                        <p class="discord-box-desc">Add me on Discord</p>
                        <a href="#" class="discord-link" onclick="copyDiscordUsername(); return false;">Alex2136</a>
                    </div>
                    <div class="contact-right">
                        <form id="contactForm" onsubmit="submitContact(event)">
                            <div class="form-row">
                                <div class="form-field">
                                    <label class="form-label">Name</label>
                                    <input type="text" class="form-input" name="name" placeholder="Your name" required>
                                </div>
                                <div class="form-field">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-input" name="email" placeholder="your.email@example.com" required>
                                </div>
                            </div>
                            <div class="form-field">
                                <label class="form-label">Subject</label>
                                <input type="text" class="form-input" name="subject" placeholder="What's this about?" required>
                            </div>
                            <div class="form-field">
                                <label class="form-label">Message</label>
                                <textarea class="form-textarea" name="message" placeholder="Tell me what you're thinking about..." required></textarea>
                            </div>
                            <button type="submit" class="submit-button">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let cookiesAccepted = false;
        let emailVerified = false;
        window.onload = function() {
            const cookiesStatus = localStorage.getItem('cookiesAccepted');
            if (!cookiesStatus) {
                setTimeout(() => {
                    document.getElementById('cookiesBanner').classList.add('show');
                }, 1000);
            } else {
                cookiesAccepted = cookiesStatus === 'true';
            }
        };
        function acceptCookies() {
            localStorage.setItem('cookiesAccepted', 'true');
            cookiesAccepted = true;
            document.getElementById('cookiesBanner').classList.remove('show');
        }
        function declineCookies() {
            localStorage.setItem('cookiesAccepted', 'false');
            cookiesAccepted = false;
            document.getElementById('cookiesBanner').classList.remove('show');
        }
        function closeContactModal() {
            document.getElementById('contactModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            if (document.getElementById('contactForm')) {
                document.getElementById('contactForm').reset();
            }
        }
        function copyDiscordUsername() {
            navigator.clipboard.writeText('Alex2136');
            alert('Discord username copied!');
        }
        async function submitContact(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            formData.append('_subject', 'New Portfolio Contact - Roblox Development');
            formData.append('_template', 'table');
            formData.append('_captcha', 'false');
            try {
                const response = await fetch('https://formsubmit.co/alexloas123d@gmail.com', {
                    method: 'POST',
                    body: formData
                });
                alert('Message sent successfully!');
                closeContactModal();
            } catch (error) {
                console.error('Error:', error);
                alert('There was an error sending your message. Please try again.');
            }
        }
    </script>
</body>
</html>
